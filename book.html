  function getQueryParam(name){
    return new URLSearchParams(window.location.search).get(name);
  }

  function formatStars(rating){
    return `${'★'.repeat(Math.round(rating))} <span style="font-size:0.92rem;color:var(--ink-soft);">${rating.toFixed(1)}</span>`;
  }

  function renderBook(book){
    document.getElementById('detailImage').src = book.cover;
    document.getElementById('detailImage').alt = `Cover of ${book.title}`;
    document.getElementById('detailTitle').textContent = book.title;
    document.getElementById('detailAuthor').textContent = `எழுத்தாளர் - ${book.author}`;
    document.getElementById('detailPrice').textContent = book.price;
    document.getElementById('detailRating').innerHTML = formatStars(book.rating);
    document.getElementById('detailRatingText').textContent = `(${book.rating.toFixed(1)} / 5)`;
    document.getElementById('detailDescription').innerHTML = book.description;
    const genre = book.genre ?? book['வகையினம்'] ?? 'Unknown';
    const pages = book.pages ?? book['பக்கங்கள்'];
    document.getElementById('detailGenre').textContent = genre;
    document.getElementById('detailPages').textContent = pages ? `${pages} பக்கங்கள்` : 'Pages unavailable';
    document.getElementById('detailAvailability').textContent = book.availability;
    document.getElementById('detailBadge').textContent = book.badge || '';
    document.getElementById('orderButton').href = `https://wa.me/${WHATSAPP_NUMBER}`;
  }

  function renderRelated(excludeIndex){
    const container = document.getElementById('relatedBooks');
    books.forEach((book, index) => {
      if (index === excludeIndex) return;
      const item = document.createElement('a');
      item.href = `book.html?id=${index}`;
      item.className = 'book-card-small';
      item.innerHTML = `
        <img src="${book.cover}" alt="Cover of ${book.title}">
        <div class="info">
          <div class="title">${book.title}</div>
          <div class="author">${book.author}</div>
          <div class="price">${book.price}</div>
        </div>
      `;
      container.appendChild(item);
    });
  }

  const id = parseInt(getQueryParam('id'), 10);
  const book = Number.isInteger(id) && books[id] ? books[id] : null;
  if (!book){
    document.getElementById('bookDetail').innerHTML = '<div style="grid-column:1/-1; padding:40px; background:var(--white); border-radius:24px; box-shadow:var(--shadow-md); text-align:center;"><h1 style="margin-bottom:14px;">Book not found</h1><p style="color:var(--ink-soft); margin-bottom:24px;">Please return to the collection and select a valid book.</p><a class="btn-secondary" href="index.html">Back to Collection</a></div>';
  } else {
    renderBook(book);
    renderRelated(id);
  }
</script>
<script>
  const navToggleBtn = document.querySelector('.nav-toggle');
  const navPanelEl = document.querySelector('.nav-panel');
  if (navToggleBtn && navPanelEl){
    const closeMenu = () => {
      navPanelEl.classList.remove('open');
      navToggleBtn.classList.remove('active');
      navToggleBtn.setAttribute('aria-expanded','false');
      navToggleBtn.setAttribute('aria-label','Open menu');
    };
    navToggleBtn.addEventListener('click', () => {
      const isOpen = navPanelEl.classList.toggle('open');
      navToggleBtn.classList.toggle('active', isOpen);
      navToggleBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      navToggleBtn.setAttribute('aria-label', isOpen ? 'Close menu' : 'Open menu');
    });
    navPanelEl.querySelectorAll('a').forEach(link => link.addEventListener('click', closeMenu));
    document.addEventListener('click', (event) => {
      if (!navPanelEl.contains(event.target) && !navToggleBtn.contains(event.target)) {
        closeMenu();
      }
    });
  }
</script>
